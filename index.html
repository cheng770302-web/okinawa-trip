<style>
:root{--ink:#14293A;--sea:#0F4C6B;--line:#D3E3E7;--muted:#5D7585;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Noto Sans TC',sans-serif;color:var(--ink);display:flex;flex-direction:column;}
header{
  background:linear-gradient(120deg,#0A3550,#0F4C6B 55%,#156E8C);color:#fff;
  padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;z-index:1000;
}
header h1{font-size:18px;font-weight:900;letter-spacing:.06em;}
.tabs{margin-left:auto;display:flex;gap:6px;}
.tab{
  border:1.5px solid rgba(255,255,255,.5);background:transparent;color:#fff;
  border-radius:999px;padding:5px 18px;font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
}
.tab.on{background:#fff;color:var(--sea);border-color:#fff;}
#map{flex:1;min-height:0;position:relative;}
.daybar{
  background:#fff;border-bottom:1px solid var(--line);padding:8px 12px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:13px;
}
.daybtn{
  border:2px solid;border-radius:999px;padding:4px 14px;font-weight:700;font-size:13px;
  cursor:pointer;background:#fff;font-family:'Noto Sans TC',sans-serif;transition:.15s;
}
.daybtn.off{opacity:.32;filter:grayscale(.6);}
.linetype{margin-left:auto;font-size:12px;color:var(--muted);font-weight:500;display:flex;gap:14px;align-items:center;}
.linetype .s{display:inline-block;width:30px;border-top:4px solid #5D7585;border-radius:2px;vertical-align:middle;margin-right:4px;}
.linetype .d{display:inline-block;width:30px;border-top:4px dashed #5D7585;vertical-align:middle;margin-right:4px;}
.num-icon{
  display:flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;color:#fff;font-weight:900;font-size:12px;
  border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4);font-family:'Noto Sans TC',sans-serif;
}
.dur-chip{
  background:#fff;border:2px solid;border-radius:999px;padding:1px 8px;
  font-size:11px;font-weight:900;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.3);
  font-family:'Noto Sans TC',sans-serif;display:inline-block;transform:translate(-50%,-50%);
}
.leaflet-popup-content{font-family:'Noto Sans TC',sans-serif;font-size:13px;line-height:1.5;margin:10px 14px;}
.leaflet-popup-content b{font-size:14px;}
.leaflet-popup-content .mode{font-size:12px;color:#5D7585;}
footer{background:#fff;border-top:1px solid var(--line);padding:6px 14px;font-size:11px;color:var(--muted);text-align:center;}
#loading{
  position:absolute;left:10px;bottom:10px;z-index:900;display:flex;gap:8px;align-items:center;
  background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:999px;
  padding:6px 14px;font-weight:700;color:var(--sea);font-size:12.5px;
  box-shadow:0 2px 10px rgba(0,0,0,.15);pointer-events:none;transition:opacity .4s;max-width:85%;
}
#loading .spin{width:16px;height:16px;border:3px solid #CFE4E8;border-top-color:var(--sea);border-radius:50%;animation:sp 1s linear infinite;flex:none;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── 景點資訊頁 ── */
#info{flex:1;min-height:0;overflow:auto;background:#F2F7F8;display:none;padding:16px 14px 40px;}
#info .wrap{max-width:960px;margin:0 auto;}
.iday{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.iday h2{font-size:16px;font-weight:900;color:#fff;padding:9px 16px;}
.itbl{width:100%;border-collapse:collapse;font-size:13px;}
.itbl th{background:#F6FAFB;color:var(--muted);font-size:12px;font-weight:700;text-align:left;padding:7px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
.itbl td{padding:8px 12px;border-bottom:1px solid #EAF2F4;vertical-align:top;line-height:1.5;}
.itbl tr:last-child td{border-bottom:none;}
.itbl .nm{font-weight:700;white-space:nowrap;}
.itbl .mc{font-variant-numeric:tabular-nums;font-weight:700;color:var(--sea);white-space:nowrap;}
.itbl .tel a{color:var(--ink);text-decoration:none;font-variant-numeric:tabular-nums;white-space:nowrap;}
.gbtn{
  display:inline-block;background:#EAF6EE;color:#1E7A46;border:1px solid #BFE3CC;
  border-radius:999px;padding:2px 12px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;
}
.gbtn:hover{background:#DDF0E4;}
.dim{color:#9AAEB8;}
.infonote{font-size:12px;color:var(--muted);text-align:center;margin:4px 0 14px;line-height:1.6;}
.iprint{
  display:block;margin:0 auto 16px;background:var(--sea);color:#fff;border:none;border-radius:999px;
  padding:9px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;
}
@media print{
  header,.daybar,#map,footer,.iprint{display:none !important;}
  #info{display:block !important;overflow:visible;background:#fff;padding:0;}
  .iday{page-break-inside:avoid;border-radius:6px;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
@media(max-width:640px){
  header h1{font-size:15px;}
  .linetype{display:none;}
  .itbl th:nth-child(4),.itbl td:nth-child(4){display:none;} /* 手機隱藏地址欄 */
}
</style>
</head>

  document.getElementById('info').style.display = t==='info'?'block':'none';

  document.getElementById('tabInfo').classList.toggle('on',t==='info');
  if(t==='map' && window._map) setTimeout(()=>window._map.invalidateSize(),50);
}

  const rows=INFO[di].items.map(it=>
    '<tr><td class="nm">'+it.n+'</td>'+
    '<td class="mc">'+(it.mc==='—'?'<span class="dim">—</span>':it.mc)+'</td>'+
    '<td class="tel">'+(/^0\d/.test(it.tel)?'<a href="tel:'+it.tel.replace(/-/g,'')+'">'+it.tel+'</a>':'<span class="dim">'+it.tel+'</span>')+'</td>'+
    '<td>'+it.addr+'</td>'+
    '<td><a class="gbtn" href="'+g(it.q)+'" target="_blank">📍 Google 地圖</a></td></tr>'
  ).join('');
  infolist.insertAdjacentHTML('beforeend',
    '<div class="iday"><h2 style="background:'+day.color+'">'+day.name+'</h2>'+
    '<table class="itbl"><tr><th>地點</th><th>Mapcode</th><th>電話</th><th>地址</th><th>導航</th></tr>'+rows+'</table></div>');
});

/* ── OSRM 實際道路 ── */
async function osrmRoute(wp){
  const coords=wp.map(p=>p[1]+','+p[0]).join(';');
  const url='https://router.project-osrm.org/route/v1/driving/'+coords+'?overview=full&geometries=geojson';
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),8000); /* 8秒逾時，不讓單一請求卡死頁面 */
  try{
    const res=await fetch(url,{signal:ctrl.signal});
    if(!res.ok) throw new Error('http');
    const j=await res.json();
    if(j.code!=='Ok'||!j.routes||!j.routes[0]) throw new Error('no route');
    return {latlngs:j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),mins:Math.round(j.routes[0].duration/60)};
  }finally{clearTimeout(timer);}
}

const bar=document.getElementById('daybar');
const legendRef=bar.querySelector('.linetype');
const loadEl=document.getElementById('loading');
const loadText=document.getElementById('loadtext');
const groups=[];
let fallbackUsed=false;

function modeEmoji(m){return m==='car'?'🚗':(m==='uber'?'🚕':'🚝');}

function drawSeg(g,day,seg,latlngs,mins,approx){
  const style={color:day.color,weight:5,opacity:.85};
  if(seg.mode==='rail'){style.dashArray='2 8';style.weight=4;}
  if(seg.mode==='uber'){style.dashArray='12 9';style.weight=4.5;}
  if(approx&&seg.mode==='car'){style.dashArray='4 6';style.opacity=.7;} /* 示意線先用短虛線 */
  const pl=L.polyline(latlngs,style);
  pl.bindPopup('<b style="color:'+day.color+'">'+day.name+'</b><br><span class="mode">'+seg.label+'　約 '+mins+' 分'+(approx?'<br>（示意路線，道路細節載入中或無網路）':'')+'</span>');
  pl.addTo(g);
  /* 路段中點的時間圓標 */
  const mid=latlngs[Math.floor(latlngs.length/2)];
  const chip=L.divIcon({className:'',iconSize:[0,0],
    html:'<span class="dur-chip" style="border-color:'+day.color+';color:'+day.color+'">'+modeEmoji(seg.mode)+' '+mins+'分</span>'});
  const mk=L.marker(mid,{icon:chip,interactive:false,keyboard:false}).addTo(g);
  return {pl,mk};
}

async function build(){
  DAYS.forEach(day=>{
    const g=L.layerGroup().addTo(map);
    groups.push(g);
    day.segs.filter(s=>s.mode==='rail').forEach(seg=>drawSeg(g,day,seg,seg.pts,seg.est,false));
    day.stops.forEach((s,si)=>{
      const icon=L.divIcon({className:'',html:'<div class="num-icon" style="background:'+day.color+'">'+(si+1)+'</div>',iconSize:[24,24],iconAnchor:[12,12]});
      L.marker(s.p,{icon}).bindPopup('<b>'+s.n+'</b><br><span class="mode">'+day.name+'<br>'+s.t+'</span>').addTo(g);
    });
    const btn=document.createElement('button');
    btn.className='daybtn';
    btn.style.borderColor=day.color;btn.style.color=day.color;
    btn.textContent=day.name.split('）')[0]+'）';
    btn.onclick=()=>{
      if(map.hasLayer(g)){map.removeLayer(g);btn.classList.add('off');}
      else{g.addTo(map);btn.classList.remove('off');}
    };
    bar.insertBefore(btn,legendRef);
  });

  const hotelIcon=L.divIcon({className:'',html:'<div class="num-icon" style="background:#14293A;width:28px;height:28px;font-size:14px">🏨</div>',iconSize:[28,28],iconAnchor:[14,14]});
  L.marker(P.hotel,{icon:hotelIcon}).bindPopup('<b>那霸美居飯店</b><br><span class="mode">壺川站旁・4晚住宿</span>').addTo(map);
  map.fitBounds(L.latLngBounds([[26.10,127.60],[26.75,128.06]]),{padding:[20,20]});

  /* 1) 先立即畫出所有開車/Uber 的示意路線 → 地圖馬上就能看、能用 */
  const jobs=[];
  DAYS.forEach((day,di)=>day.segs.forEach(seg=>{
    if(seg.mode!=='rail'){
      const drawn=drawSeg(groups[di],day,seg,seg.wp,seg.est,true);
      jobs.push({day,di,seg,drawn});
    }
  }));

  /* 2) 背景並列向 OSRM 要實際道路，成功一段就替換一段（每段最多等8秒） */
  let done=0,ok=0;
  const upgrade=async job=>{
    try{
      const r=await osrmRoute(job.seg.wp);
      groups[job.di].removeLayer(job.drawn.pl);
      groups[job.di].removeLayer(job.drawn.mk);
      drawSeg(groups[job.di],job.day,job.seg,r.latlngs,r.mins||job.seg.est,false);
      ok++;
    }catch(e){fallbackUsed=true;}
    done++;
    loadText.textContent='載入道路細節… '+done+'/'+jobs.length;
  };
  /* 每批4段並列，避免手機瀏覽器連線數限制 */
  for(let i=0;i<jobs.length;i+=4){
    await Promise.allSettled(jobs.slice(i,i+4).map(upgrade));
  }
  loadText.textContent = ok===jobs.length ? '✓ 已載入實際道路路線'
    : (ok>0 ? '✓ 部分路段已載入實際道路（其餘為示意線）'
            : '⚠ 無法連線路徑服務，以示意線顯示（不影響瀏覽）');
  setTimeout(()=>{loadEl.style.opacity='0';setTimeout(()=>loadEl.remove(),500);},3500);
}
build();
</script>
